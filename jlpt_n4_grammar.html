<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>JLPT N4 文法クイズ(30問)</title>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#eef2ff,#e0e7ff);margin:0;padding:0;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
.card{max-width:420px;width:100%;min-height:100vh;margin:0;background:#fff;border-radius:0;box-shadow:none;padding:0;position:relative;box-sizing:border-box}

/* タブ */
.tabs{display:flex;border-bottom:2px solid #c7d2fe;}
.tab{flex:1;padding:16px 0;text-align:center;font-size:1.1rem;font-weight:bold;cursor:pointer;border:none;background:#eef2ff;color:#6366f1;transition:background 0.2s,color 0.2s;}
.tab.active{background:#fff;color:#3730a3;border-bottom:3px solid #4f46e5;margin-bottom:-2px;}
.tab:first-child{border-radius:0;}
.tab:last-child{border-radius:0;}

.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}

h1{color:#3730a3;font-size:1.5rem;margin:10px 0 20px 0;}
button{padding:16px 18px;border-radius:10px;border:1px solid #c7d2fe;background:#eef2ff;cursor:pointer;font-size:1.15rem}
button.primary{background:#4f46e5;color:#fff;border:none;font-size:1.15rem;padding:16px;margin-top:10px;width:100%;border-radius:10px;}
button.option{display:flex;width:100%;margin:12px 0;text-align:center;white-space:normal;min-height:56px;font-size:1.4rem;line-height:1.5;align-items:center;justify-content:center;box-sizing:border-box;}
button.option.correct{background:#dcfce7;border-color:#22c55e}
button.option.wrong{background:#fee2e2;border-color:#ef4444}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:16px}
.progress>div{height:10px;background:#4f46e5;transition:width 0.3s;}
.explain{background:#f8fafc;padding:16px;border-radius:10px;margin-top:16px;font-size:1.1rem;line-height:1.7}
.back-btn{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe;padding:10px 14px;font-size:0.95rem;border-radius:8px;cursor:pointer;margin-bottom:12px;}
h3{font-size:1.5rem;margin:20px 0 24px 0;line-height:1.9;font-weight:bold}
p{margin:12px 0;font-size:1.1rem}
h2{font-size:1.8rem;color:#3730a3;margin:24px 0 16px 0}

/* 学習モード */
.study-card{background:#f8fafc;border:1.5px solid #c7d2fe;border-radius:12px;padding:20px;margin-bottom:16px;}
.study-q{font-size:1.4rem;font-weight:bold;margin-bottom:10px;line-height:1.9;}
.study-answer{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e0e7ff;}
.study-answer.show{display:block;}
.study-particle{font-size:2rem;font-weight:bold;color:#4f46e5;margin-bottom:6px;}
.study-ex{font-size:1rem;color:#555;line-height:1.6;}
.toggle-btn{background:#4f46e5;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:8px;}
.study-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.study-count{font-size:0.95rem;color:#6366f1;}
</style>
</head>
<body>
<div class="card">
  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('quiz')">📝 クイズ</button>
    <button class="tab" onclick="switchTab('study')">📖 がくしゅう</button>
  </div>

  <!-- クイズタブ -->
  <div id="quiz" class="tab-content active">
    <h1>JLPT N4 ぶんぽうクイズ</h1>
    <div id="app"></div>
  </div>

  <!-- 学習モードタブ -->
  <div id="study" class="tab-content">
    <div class="study-header">
      <h1 style="margin:0;">がくしゅうモード</h1>
      <span class="study-count" id="study-count"></span>
    </div>
    <div id="study-list"></div>
  </div>
</div>

<script>
const questions = [
{q:"まいあさ6時（　）おきます。",opts:["で","に","を","が"],c:1,e:"時間には「に」を使います。"},
{q:"いえ（　）ねこが出てきました。",opts:["の","を","に","から"],c:3,e:"でてくるばしょは「から」。"},
{q:"えき（　）としょかんまで歩いて10分です。",opts:["から","まで","に","で"],c:0,e:"「から」ははじまりです。"},
{q:"このハンカチ（　）だれのですか。",opts:["を","に","で","は"],c:3,e:"しゅだいは「は」。"},
{q:"たなかさんは　じむしょ（　）います。",opts:["に","を","で","へ"],c:0,e:"います・ありますは「に」です。"},
{q:"あには　私（　）としうえです。",opts:["より","まで","ほど","から"],c:0,e:"くらべるときは「より」。"},
{q:"でんしゃ（　）おりるときかさをわすれました。",opts:["を","に","で","が"],c:0,e:"おりるときは「を」。"},
{q:"としょかん（　）本をかりました。",opts:["に","へ","で","を"],c:2,e:"どうさのばしょは「で」。"},
{q:"スーパーでパン（　）ぎゅうにゅうを買いました。",opts:["や","と","か","を"],c:1,e:"ならべるときは「と」。"},
{q:"ちゅうごくは日本（　）大きいです。",opts:["から","まで","より","ほど"],c:2,e:"くらべるときは「より」。"},
{q:"このビル（　）１かいにコンビニがあります。",opts:["を","が","に","の"],c:3,e:"しょぞくは「の」。"},
{q:"姉は私（　）せが高いです。",opts:["から","まで","より","ほど"],c:2,e:"くらべるときは「より」。"},
{q:"駅（　）着いたら電話してください。",opts:["を","が","に","で"],c:2,e:"とうちゃくてんは「に」。"},
{q:"りんご（　）みかん、どちらが大きいですか。",opts:["や","に","か","と"],c:3,e:"くらべるときは「と」。"},
{q:"私はコーヒー（　）が好きです。",opts:["を","に","が","で"],c:2,e:"すきは「が」。"},
{q:"１しゅうかん（　）３かいアルバイトをしています。",opts:["を","が","に","で"],c:2,e:"ひんどは「に」。"},
{q:"しけん（　）ごうかくしました。",opts:["を","に","が","で"],c:1,e:"ごうかくは「に」。"},
{q:"みかん（　）りんごのほうが大きいです。",opts:["から","まで","より","ほど"],c:2,e:"くらべるときは「より」。"},
{q:"バスの時間（　）まにあいませんでした。",opts:["を","に","で","が"],c:1,e:"まにあうは「に」。"},
{q:"きっさてん（　）おちゃをのみました。",opts:["に","へ","で","を"],c:2,e:"たべる・のむばしょは「で」。"},
{q:"いもうとは母（　）にています。",opts:["を","に","で","が"],c:1,e:"にているは「に」。"},
{q:"かべ（　）カレンダーがかけてあります。",opts:["を","と","が","に"],c:3,e:"ばしょは「に」。"},
{q:"どうぞこのイス（　）おかけください。",opts:["を","に","で","が"],c:1,e:"すわるばしょは「に」。"},
{q:"まいにち　朝ごはん（　）食べます。",opts:["や","と","か","を"],c:3,e:"たいしょうは「を」。"},
{q:"私は日本語（　）わかります。",opts:["を","に","で","が"],c:3,e:"わかる・できるは「が」。"},
{q:"こんにちは。さくら大学（　）カリナです。",opts:["を","に","で","の"],c:3,e:"しょぞくは「の」。"},
{q:"きのう（　）今日のほうがさむいです。",opts:["から","まで","より","ほど"],c:2,e:"くらべるときは「より」。"},
{q:"日本のおさけはこめ（　）つくられています。",opts:["で","に","を","から"],c:3,e:"ざいりょうは「から」。"},
{q:"かじ（　）いえがやけました。",opts:["に","で","を","が"],c:1,e:"げんいんは「で」。"},
{q:"いつもあのこうえん（　）とおってかえります。",opts:["に","で","を","へ"],c:2,e:"みち・けいろは「を」。"}
];

// ===== タブ切り替え =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'study') renderStudy();
}

// ===== クイズ =====
let i=0, answers=[], locked=false, shuffledQuestions=[];
const app=document.getElementById('app');

function shuffleQuestions() {
  shuffledQuestions = [...questions];
  for (let k = shuffledQuestions.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [shuffledQuestions[k], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[k]];
  }
}

function render(){
  if(i>=shuffledQuestions.length){
    const score=answers.filter((a,idx)=>a===shuffledQuestions[idx].c).length;
    const rate=Math.round(score/shuffledQuestions.length*100);
    app.innerHTML=`<h2>けっか</h2>
    <p>せいかい：${score} / ${shuffledQuestions.length}</p>
    <p>せいかいりつ：${rate}%</p>
    <button class="primary" onclick="i=0;answers=[];shuffleQuestions();render()">もういちどチャレンジ</button>`;
    return;
  }
  const q=shuffledQuestions[i];
  locked=false;
  app.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <button class="back-btn" onclick="if(i>0){i--;} render()">◀ もどる</button>
      <span style="font-size:0.95rem;color:#6366f1;">もんだい ${i+1} / ${shuffledQuestions.length}</span>
    </div>
    <div class="progress"><div style="width:${(i+1)/shuffledQuestions.length*100}%"></div></div>
    <h3>${q.q}</h3>
    ${q.opts.map((o,idx)=>`<button class="option" onclick="answer(${idx})">${o}</button>`).join('')}
    <div id="ex"></div>
  `;
}

function answer(idx){
  if(locked) return;
  locked=true;
  answers[i]=idx;
  const q=shuffledQuestions[i];
  document.querySelectorAll('.option').forEach((b,j)=>{
    if(j===q.c) b.classList.add('correct');
    if(j===idx && idx!==q.c) b.classList.add('wrong');
  });
  document.getElementById('ex').innerHTML =
    `<div class="explain">せつめい：${q.e}</div>
     <button class="primary" onclick="i++;render()">つぎへ ▶</button>`;
}

// ===== 学習モード =====
function renderStudy() {
  const list = document.getElementById('study-list');
  document.getElementById('study-count').textContent = `${questions.length}もん`;
  list.innerHTML = questions.map((q, idx) => {
    const answer = q.opts[q.c];
    const answered = q.q.replace('（　）', `（${answer}）`);
    return `
    <div class="study-card">
      <div class="study-q">${idx+1}. ${q.q}</div>
      <button class="toggle-btn" onclick="toggleAnswer(${idx})">こたえをみる</button>
      <div class="study-answer" id="ans-${idx}">
        <div class="study-particle">こたえ：${answer}</div>
        <div style="font-size:1.1rem;margin-bottom:6px;">📝 ${answered}</div>
        <div class="study-ex">💡 ${q.e}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleAnswer(idx) {
  const ans = document.getElementById(`ans-${idx}`);
  const btn = ans.previousElementSibling;
  if (ans.classList.contains('show')) {
    ans.classList.remove('show');
    btn.textContent = 'こたえをみる';
  } else {
    ans.classList.add('show');
    btn.textContent = 'かくす';
  }
}

shuffleQuestions();
render();
</script>
</body>
</html>
